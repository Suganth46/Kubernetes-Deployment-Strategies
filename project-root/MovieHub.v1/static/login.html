<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieHub Admin Login</title>
    <link rel="stylesheet" href="tailwind.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-950 text-white min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.12),transparent_55%)]"></div>
    <div class="absolute inset-0 bg-[linear-gradient(120deg,rgba(15,23,42,0.95),rgba(15,23,42,0.75),rgba(15,23,42,0.95))]"></div>

    <div class="z-10 w-full max-w-md p-8 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-md shadow-2xl">
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-semibold text-white mb-2">Admin Panel</h1>
        <p class="text-slate-300 text-sm">Sign in to access the MovieHub dashboard.</p>
      </div>

      <form id="login-form" onsubmit="event.preventDefault(); return false;" class="flex flex-col gap-5">
        <div id="error-msg" class="hidden text-red-400 text-sm text-center bg-red-400/10 border border-red-400/20 py-2 rounded-lg">
          Invalid credentials. Please try again.
        </div>

        <div>
          <label class="block text-xs uppercase tracking-[0.1em] text-slate-400 mb-2">Email</label>
          <input
            id="email-input"
            type="email"
            placeholder="admin@example.com"
            class="w-full rounded-xl border border-white/15 bg-slate-900/50 px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-emerald-200/70 focus:outline-none transition"
            required
          />
        </div>

        <div>
          <label class="block text-xs uppercase tracking-[0.1em] text-slate-400 mb-2">Password</label>
          <input
            id="password-input"
            type="password"
            placeholder="••••••••"
            class="w-full rounded-xl border border-white/15 bg-slate-900/50 px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-emerald-200/70 focus:outline-none transition"
            required
          />
        </div>

        <button
          type="button" id="login-button"
          class="mt-2 w-full rounded-xl bg-emerald-300 px-4 py-3 text-sm font-semibold text-slate-900 transition hover:bg-emerald-200 hover:-translate-y-0.5 shadow-lg shadow-emerald-500/20"
        >
          Secure Login
        </button>

        <a href="index.html" class="mt-4 text-center text-xs text-slate-400 hover:text-white transition">
          ← Back to MovieHub
        </a>
      </form>
    </div>

            <script>
      const loginForm = document.getElementById("login-form");
      const emailInput = document.getElementById("email-input");
      const passwordInput = document.getElementById("password-input");
      const errorMsg = document.getElementById("error-msg");

      function attemptLogin(e) {
        if (e) e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          errorMsg.textContent = "Please enter both email and password.";
          errorMsg.classList.remove("hidden");
          return false;
        }

        if (email === "selvamthiru712@gmail.com" && password === "_Thiru@4690") {
          errorMsg.classList.add("hidden");
          localStorage.setItem("adminUser", email);
          localStorage.setItem("isAdmin", "true");
          window.location.replace("admin.html");
          return true;
        } else {
          errorMsg.textContent = "Invalid credentials. Please try again.";
          errorMsg.classList.remove("hidden");
          return false;
        }
      }

      loginForm.addEventListener("submit", attemptLogin);
      document.getElementById("login-button").addEventListener("click", attemptLogin);
    </script>
  </body>
</html>
